name: Daily Refresh

on:
  # 周一到周五 16:30 北京时间 (= 08:30 UTC,GitHub Actions 用 UTC)
  schedule:
    - cron: "30 8 * * 1-5"

  # 手动触发(测试用)
  workflow_dispatch:

# 防并发同时跑两次
concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # 允许 commit & push

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🔄 刷新 data.json
        run: python scripts/update_dashboard.py

      - name: 💾 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/judgment.json
          # 仅在有改动时提交
          if git diff --staged --quiet; then
            echo "无改动,跳过 commit"
          else
            git commit -m "Auto-refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
